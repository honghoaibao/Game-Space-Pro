name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, Static Analysis & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ktlint
        run: ./gradlew ktlintCheck

      - name: Detekt
        run: ./gradlew detekt

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload lint/test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports
          retention-days: 14

  build-debug:
    name: Build Debug APK
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gamespace-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build & Sign Release APK
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      # Chỉ ký nếu repo có đủ 4 secrets bên dưới (Settings → Secrets → Actions).
      # Nếu thiếu, bước này bị bỏ qua và artifact release vẫn được tải lên ở dạng chưa ký.
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Sign release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gamespace-release-apk
          path: app/build/outputs/apk/release/*.apk
