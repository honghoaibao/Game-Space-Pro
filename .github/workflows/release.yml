name: Release

# Triggered by pushing a tag like v1.0.0 — NOT by every push to main/develop
# (that's build.yml's job). Produces a GitHub Release with the APK attached
# as a directly downloadable file, per the product spec's "Version Code,
# Version Name, Git Tags, Release Notes, Artifact Upload" requirement —
# this is a more permanent, publicly-linkable download than build.yml's
# workflow-run artifacts (which require being logged into GitHub and expire
# after 14 days).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (for re-running without pushing a new tag)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The tagged commit isn't guaranteed to be one build.yml already
      # validated (e.g. a tag pushed to an old commit) — don't publish a
      # public release without at least the unit test suite passing.
      - name: Unit tests
        run: gradle testDebugUnitTest

      - name: Determine version from tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # Unlike build.yml, this job requires real signing secrets — an
      # unsigned APK isn't something worth attaching to a public release.
      # Fails loudly here rather than silently publishing an unsigned APK.
      - name: Verify signing secrets are configured
        run: |
          if [[ -z "${{ secrets.SIGNING_KEY_BASE64 }}" ]]; then
            echo "::error::SIGNING_KEY_BASE64 is not set. Run scripts/generate-release-keystore.sh and add the 4 signing secrets before tagging a release."
            exit 1
          fi

      - name: Decode release keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "keystore_path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          SIGNING_STORE_FILE: ${{ env.keystore_path }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: >
          gradle assembleRelease
          -PversionNameOverride=${{ steps.version.outputs.version_name }}
          -PversionCodeOverride=${{ steps.version.outputs.version_code }}

      - name: Rename APK to include the version
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          DEST="app/build/outputs/apk/release/GameSpaceATTOOL-${{ steps.version.outputs.version_name }}.apk"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.apk.outputs.path }}" \
            --title "Game Space : AT TOOL ${{ steps.version.outputs.version_name }}" \
            --generate-notes
