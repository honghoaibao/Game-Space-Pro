name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # No gradlew committed in this repo (this sandbox had no network
      # route to services.gradle.org to generate a real wrapper jar — see
      # README "Toolchain decisions"). setup-gradle provisions the exact
      # Gradle version below directly on the runner instead; every step
      # calls `gradle`, not `./gradlew`. If a real wrapper gets committed
      # later (e.g. after opening once in Android Studio, which
      # auto-generates it), switch this back to
      # gradle/actions/wrapper-validation@v4 + `./gradlew` for the
      # version-consistency guarantee the wrapper exists to provide.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: ktlint
        run: gradle ktlintCheck --continue

      - name: Detekt
        run: gradle detekt --continue

      - name: Unit tests
        run: gradle testDebugUnitTest --continue

      - name: Android Lint
        run: gradle lintDebug --continue

      - name: Assemble debug APK
        run: gradle assembleDebug

      # Decodes the release keystore from a secret, if one has been
      # configured on this repo. `has_signing` gates the two mutually
      # exclusive assemble steps below — this is what implements the spec's
      # "signed if secrets exist, otherwise unsigned" requirement.
      - name: Decode release keystore
        id: signing
        if: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "has_signing=true" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK (signed)
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        env:
          SIGNING_STORE_FILE: ${{ steps.signing.outputs.keystore_path }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Assemble release APK (unsigned)
        if: ${{ steps.signing.outputs.has_signing != 'true' }}
        run: gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: '**/build/reports/lint-results-*.html'
          if-no-files-found: ignore

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore

      - name: Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: '**/build/reports/ktlint/'
          if-no-files-found: ignore
