name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Fails the build if gradle/wrapper/gradle-wrapper.jar has been
      # tampered with or doesn't match a known-good Gradle release checksum.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ktlint
        run: ./gradlew ktlintCheck --continue

      - name: Detekt
        run: ./gradlew detekt --continue

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Android Lint
        run: ./gradlew lintDebug --continue

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      # Decodes the release keystore from a secret, if one has been
      # configured on this repo. `has_signing` gates the two mutually
      # exclusive assemble steps below — this is what implements the spec's
      # "signed if secrets exist, otherwise unsigned" requirement.
      - name: Decode release keystore
        id: signing
        if: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "has_signing=true" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK (signed)
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        env:
          SIGNING_STORE_FILE: ${{ steps.signing.outputs.keystore_path }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Assemble release APK (unsigned)
        if: ${{ steps.signing.outputs.has_signing != 'true' }}
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: '**/build/reports/lint-results-*.html'
          if-no-files-found: ignore

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore

      - name: Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: '**/build/reports/ktlint/'
          if-no-files-found: ignore
